<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Elena</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Livvic:wght@400;700;900&display=swap"
    rel="stylesheet"
  />

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#282452] min-h-screen font-[Livvic] text-white flex flex-col">

  <!-- HEADER -->
  <header class="w-full">
    <div class="max-w-[1290px] mx-auto px-5 py-5 flex items-center gap-4">
      <a href="#">
        <img src="./images/Group 1.png" alt="logo" />
      </a>
      <h1 class="text-white text-[20px] font-normal">Ask Elena</h1>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 flex items-center">
    <section class="w-full">
      <div class="max-w-[1290px] mx-auto px-5 py-5">
        <div class="bg-[#201C46] rounded-[20px] p-5 flex flex-col gap-5 min-h-[400px] justify-center">

          <img src="./images/Sound Robot.png" alt="robot" class="w-[100px]" />

          <form id="form" class="w-full">
            <input
              type="text"
              placeholder="Hi, I am Elena. What can I do for you today?"
              id="input"
              class="w-full bg-transparent border-none outline-none text-[20px] font-extrabold text-white placeholder:text-white/70"
            />
          </form>

          <div id="result" class="text-white text-[18px] font-bold"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="pb-6">
    <div class="max-w-[1290px] mx-auto px-5">
      <div class="bg-[#1A1732] w-[330px] rounded-[30px] mx-auto flex items-center justify-center gap-[35px] py-4">
        <a href="#">
          <img src="./images/mdi_google-lens.png" alt="lens" />
        </a>

        <button id="btn" type="button" class="active:scale-95 transition">
          <img src="./images/Button.png" alt="button" />
        </button>

        <a href="#">
          <img src="./images/fluent_keyboard-24-regular.png" alt="keyboard" />
        </a>
      </div>
    </div>
  </footer>

  <script src="./main.js"></script>
</body>
</html>
